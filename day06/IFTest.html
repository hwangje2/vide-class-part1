<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>   
        <input type="number" id="score" placeholder="점수를 입력">
    </div>
    <div>
        <button type="button" onclick="getresult();">확인</button>
    </div>
    <script>
        
        function getresult() {

            const score = document.querySelector('#score');

            if(score.value.trim() .length === 0) {
                alert( '값을 입력하세요. ');
                return; // 함수 종료
            }
            
            if(parseInt(score.value) >= 65)  {
                alert('합격입니다.');
            }else {
                alert('불합격입니다.');
        
            }
    </script>
</body>
</html>
