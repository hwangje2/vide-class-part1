<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
        <button type="button" onclick="getresult();">확인</button>
        <p id="nembers"></p>
    <script>
        function getresult() { 
            const randva1 = Math.floor(Math.random() * 20) + 1;
           const pTag = document.querySelector('#nembers');
            pTag.textContent = `${randva1} 세` ;

            if(randva1 >= 18) {
                alert('나이:' + randva1 + ', 성인입니다.');
            }else if(randva1 >= 13) {
                alert( '나이 ' + randva1 + ', 청소년입니다.');
            }else {
                alert( '나이 ' + randva1 + ', 어린이입니다.');
            }
            }
    </script>
</body>
</html>
