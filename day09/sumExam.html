<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="num" placeholder="합을 구할 숫자를 입력하세요 (10~100)">
    <button type="button" onclick="sum();">더하기</button>
    <p>
        결과: <span id="result"></span>
    </p>
    <script>
        const sum = ( ) => {
            const number  = document.querySelector('#num');

            if(number.value.trim().length ===0 ) {
                alert('합의 범위를 입력하시오.');
                return;
            }

            let sum = 0;
            for (let i = 1; i <= number.value ; i++) {
                sum += i;
            }
           
            const resultText = document.querySelector("#result");
            resultText.textContent = sum;
        }
        
    </script>
</body>
</html>
