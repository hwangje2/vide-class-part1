<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <style>
      .container {
           display: flex;
           flex-direction: row;
           flex-wrap: wrap;
           justify-content: flex-start;
           align-content: flex-start;
           width: 800px;
           height: 600px;
           border: 1px solid black;
           gap : 10px;  
           overflow: auto;
      }

        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
        }

        .buttonArea {
            text-align: center;
            margin-top: 10px;
            width: 800px;
        }
    </style>
</head>
<body>
    <div class="container"></div>
    <div class="buttonArea">
        <button type="button" onclick="makeBox();">생성</button>
        <button type="button" onclick="deleteBox();">삭제</button>
    </div>
    <script>
        const conatainer = document.querySelector('.container');
         
         const colors = () =>{
            const arrColor = [];

            for (let i = 0; i < 3; i++) {
                const rgb = Math.floor(Math.random() * 256);
                let hex = rgb.toString(16);

                if (hex.length === 1) {
                    hex = '0' + hex;
                }
                arrColor.push(hex);
            }
                return '#' + arrColor.join('');

            }

            function makeBox() {
            const box = document.createElement('div');
            box.className ='box';
            box.style.backgroundColor = colors();

            conatainer.append(box);

         }

         function deleteBox() {
            if (conatainer.childElementCount > 0) {
            }
            conatainer.removeChild(conatainer.lastChild);
         }
           
    </script>
</body>ß
</html>
