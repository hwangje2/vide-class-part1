<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     const arr = [1,2,3,4,5];

 function loop(callback){
        for(i = 0; i < arr.length; i ++) {
            callback(i, arr[i]);
        }
    }

   loop(function(index, value){
        console.log(`${index},  ${value}`);
   });
</body>
</html>
